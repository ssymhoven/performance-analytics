name-template: 'v$RESOLVED_VERSION 🔥'
tag-template: '$RESOLVED_VERSION'

template: |
  $CHANGES

categories:
  - title: 💥 Removed
    label: removed
  - title: ⚠️ Deprecated
    label: deprecated
  - title: 🚀 New features
    labels:
      - feature
  - title: ✨ Improvements
    labels:
      - enhancement
  - title: 🐛 Bug Fixes
    labels:
      - bug
      - fix
      - bugfix
      - regression
  - title: 📝 Documentation updates
    label: documentation
  - title: 📦 Dependency updates
    label: dependencies
  - title: 🔧 Internal changes
    label: internal
  - title: 🚦 Tests
    labels:
      - test
      - tests

version-resolver:
  major:
    labels:
      - 'removed'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
      - 'deprecated'
      - 'bug'
  patch:
    labels:
      - 'dependencies'
      - 'documentation'
      - 'tests'
      - 'internal'
  default: minor